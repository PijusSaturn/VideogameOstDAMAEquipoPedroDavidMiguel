<main>
    
    <div class="container mt-5">
    <div class="card shadow">
        <div class="card-body">
            <h5 class="card-title">Super Mario RPG</h5>
            <img src="/assets/img/MarioRPG.jpg" class="page-thumb" alt="Majora's Mask">

            <audio id="audioPlayer" controls class="w-100 mb-3">
                Tu navegador no soporta audio HTML5
            </audio>

            <ul class="list-group" id="playlist">
                <li class="list-group-item list-group-item-action"
                    src="/assets/Audio/1-10 Fight Against Monsters.mp3">
                    Fight Against Monsters
                </li>
                <li class="list-group-item list-group-item-action"
                    src="/assets/Audio/1-12 Hello, Happy Kingdom.mp3">
                    Hello, Happy Kingdom
                </li>
                <li class="list-group-item list-group-item-action"
                    src="/assets/Audio/1-28 Beware the Forest's Mushrooms.mp3">
                    Beware the Forest's Mushrooms
                </li>
                <li class="list-group-item list-group-item-action"
                    src="/assets/Audio/2-11 Let's Do the Fluff-Fluff!.mp3">
                    Let's Do the Fluff-Fluff!
                </li>
            </ul>
        </div>
    </div>
</div>
</main>
<div class="container">
    <footer class="py-3 my-4">
        <ul class="nav justify-content-center border-bottom pb-3 mb-3">

    </footer>
</div>
<script>
    const player = document.getElementById('audioPlayer');
    const playlist = document.getElementById('playlist');
    const tracks = playlist.getElementsByTagName('li');

    playlist.addEventListener('click', function (e) {
        if (e.target && e.target.nodeName === 'LI') {
            // quitar clase activa
            for (let i = 0; i < tracks.length; i++) {
                tracks[i].classList.remove('active');
            }

            // activar pista seleccionada
            e.target.classList.add('active');

            // cargar y reproducir
            player.src = e.target.getAttribute('src');
            player.play();
        }
    });
</script>
