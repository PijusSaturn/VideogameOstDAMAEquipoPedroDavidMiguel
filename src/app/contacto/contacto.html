<main class="container py-5">
  <h1 class="text-center mb-5">
    Contacto
  </h1>
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card contacto-card p-4">
        <form (ngSubmit)="enviarFormulario()">
          <div class="mb-3">
            <label class="form-label">
              Nombre
            </label>
            <input
              type="text"
              class="form-control"
              [(ngModel)]="nombre"
              name="nombre"
              required>
          </div>
          <div class="mb-3">
            <label class="form-label">
              Email
            </label>
            <input
              type="email"
              class="form-control"
              [(ngModel)]="email"
              name="email"
              required>
          </div>
          <div class="mb-3">
            <label class="form-label">
              Mensaje
            </label>
            <textarea
              class="form-control"
              rows="5"
              [(ngModel)]="mensaje"
              name="mensaje"
              required>
            </textarea>
          </div>
          <button
            type="submit"
            class="btn btn-primary w-100">
            Enviar mensaje
          </button>
        </form>
      </div>
    </div>
  </div>
</main>
