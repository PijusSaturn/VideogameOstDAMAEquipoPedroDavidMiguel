<main class="container">
  <h1>Catálogo de Soundtracks</h1>

  <div class="filtros">
    <input
      type="text"
      (input)="filtrar($event)"
      placeholder="Buscar soundtrack, juego o compositor...">

    <button (click)="limpiarFiltros()">Limpiar</button>
  </div>

  <div *ngIf="loading" class="loader">
    <p>Cargando catálogo...</p>
  </div>

  <div class="grid-soundtracks" *ngIf="!loading">
    <div *ngFor="let item of filtrados" class="soundtrack-card">
      <img [src]="item.cover" [alt]="item.title"
           onerror="this.src='https://via.placeholder.com/300x200?text=Sin+Imagen'">

      <div class="soundtrack-info">
        <h3 class="soundtrack-title">{{ item.title }}</h3>
        <p class="soundtrack-composer">{{ item.composer }}</p>
        <div class="soundtrack-meta">
          <span>{{ item.platform }} • {{ item.year }}</span>
          <span>{{ item.duration }}</span>
        </div>
        <div class="tags">
          <span *ngFor="let tag of item.tags" class="tag">{{ tag }}</span>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="filtrados.length === 0 && !loading" class="mensaje-vacio">
    <p>No se encontraron soundtracks con esos filtros.</p>
  </div>
</main>
