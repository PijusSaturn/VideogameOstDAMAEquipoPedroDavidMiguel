<div class="auth-container">

  <div class="auth-card">

    <h1>Registro</h1>

    <form>

      <input
        type="text"
        placeholder="Nombre de usuario"
      >

      <input
        type="email"
        placeholder="Correo electrónico"
      >

      <input
        type="password"
        placeholder="Contraseña"
      >

      <button type="submit">
        Crear cuenta
      </button>

    </form>

    <div class="switch-auth">

      <label>
        ¿Ya tienes cuenta?
      </label>

      <a routerLink="/login">
        Inicia sesión
      </a>

    </div>

  </div>

</div>
