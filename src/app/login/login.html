<div class="auth-container">
  <div class="auth-card">
    <h1>Log In</h1>
    <form>
      <input
        type="email"
        placeholder="Correo electrónico"
      >
      <input
        type="password"
        placeholder="Contraseña"
      >
      <button type="submit">
        Iniciar sesión
      </button>
    </form>
    <div class="switch-auth">
      <label>
        ¿No tienes cuenta?
      </label>
      <a routerLink="/register">
        Regístrate aquí
      </a>
    </div>
  </div>
</div>
