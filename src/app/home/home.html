<main>

  <h2>🎧 OST Destacadas</h2>

  <section class="ost-grid">

    <article class="ost-card" *ngFor="let ost of osts">

      <img [src]="ost.imagen" [alt]="ost.titulo">

      <div class="ost-info">
        <h3>{{ ost.titulo }}</h3>
        <span>{{ ost.autor }}</span>
      </div>

    </article>

  </section>

</main>
